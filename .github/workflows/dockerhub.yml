name: Build and Push Images to Docker Hub

on:
  push:
    branches: ["main"]

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mybudgetapp-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mybudgetapp-api:${{ github.sha }}

      - name: Build and push Client
        uses: docker/build-push-action@v6
        with:
          context: ./MyBudgetApp.Client
          file: ./MyBudgetApp.Client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mybudgetapp-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mybudgetapp-client:${{ github.sha }}